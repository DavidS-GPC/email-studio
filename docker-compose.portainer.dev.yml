services:
  email-app-dev:
    image: davidscreations/email-studio:dev-latest
    container_name: email-app-dev
    restart: unless-stopped
    user: "0:0"
    ports:
      - "3201:3200"
    environment:
      DATABASE_URL: file:/app/data/dev.db
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      AUTH_PUBLIC_URL: ${AUTH_PUBLIC_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_AZURE_AD_ID: ${AUTH_AZURE_AD_ID}
      AUTH_AZURE_AD_SECRET: ${AUTH_AZURE_AD_SECRET}
      AUTH_AZURE_AD_TENANT_ID: ${AUTH_AZURE_AD_TENANT_ID}
      CONTACT_DATA_ENCRYPTION_KEY: ${CONTACT_DATA_ENCRYPTION_KEY}
      CONTACT_DATA_HASH_PEPPER: ${CONTACT_DATA_HASH_PEPPER}
      CAMPAIGN_PROCESS_SECRET: ${CAMPAIGN_PROCESS_SECRET}
      LOCAL_ADMIN_USERNAME: ${LOCAL_ADMIN_USERNAME}
      LOCAL_ADMIN_PASSWORD: ${LOCAL_ADMIN_PASSWORD}
    volumes:
      - email_app_dev_data:/app/data
      - email_app_dev_uploads:/app/public/uploads
    networks:
      - cftunnel_default

  campaign-scheduler-dev:
    image: curlimages/curl:8.12.1
    container_name: campaign-scheduler-dev
    restart: unless-stopped
    depends_on:
      - email-app-dev
    environment:
      APP_INTERNAL_URL: http://email-app-dev:3200
      CAMPAIGN_PROCESS_SECRET: ${CAMPAIGN_PROCESS_SECRET}
      CAMPAIGN_PROCESS_INTERVAL_SECONDS: ${CAMPAIGN_PROCESS_INTERVAL_SECONDS:-60}
    command:
      - /bin/sh
      - -c
      - |
        while true; do
          curl -fsS -X POST "${APP_INTERNAL_URL}/api/campaigns/process-due" \
            -H "x-campaign-cron-secret: ${CAMPAIGN_PROCESS_SECRET}" || true
          sleep "${CAMPAIGN_PROCESS_INTERVAL_SECONDS}"
        done
    networks:
      - cftunnel_default

volumes:
  email_app_dev_data:
    name: email_app_dev_data
  email_app_dev_uploads:
    name: email_app_dev_uploads

networks:
  cftunnel_default:
    external: true
