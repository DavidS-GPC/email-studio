name: CI Validation

on:
  pull_request:
    branches: ["master", "main"]
  push:
    branches: ["master", "main", "dev"]

jobs:
  validate:
    name: Lint, Build, Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Integration quick tests
        run: npm run test:integration:quick
